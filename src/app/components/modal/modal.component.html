<div class="abrir-modal animacion fadeIn">
  <div class="modal" style="display: block;" tabindex="-1">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Carro de Compras!</h3>
          <button class="btn-close me-1" (click)="closeCart()"></button>
        </div>
        <div class="modal-body">
          @if (items.length > 0){
            <app-cart class="my-3" [items]="items" (idProductEventEmitter)="onDeleteCart($event)"/>
          } @else {
            <div class="alert alert-warning my-3">No hay elementos en el carro!</div>
          }
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeCart()">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>
