<app-navbar [items]="items" (openCartEventEmitter)="openCloseCart()"/>

<div class="container my-5">
  <h2>Catalogo de Productos App!</h2>
  <app-catalog [products]="products" (productAddEventEmitter)="onAddCart($event)"/>
  @if (showCart){
    <app-modal [items]="items" (idProductEventEmitter)="onDeleteCart($event)" (closeCartEventEmitter)="openCloseCart()"/>
  }
</div>
